services:
  # Binance sync Go service
  binance-api:
    build:
      context: .
      dockerfile: Dockerfile
      # Use all available CPU cores for faster builds
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: binance-api
    ports:
      - "8082:8082"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"
    labels:
      - "service=binance-api"
    networks:
      - monitoring
    develop:
      watch:
        # Rebuild the image and recreate the container on any code change
        - action: rebuild
          path: .
          ignore:
            - bin/
            - data/
            - docker/
            - var/
            - .git/
            - .gitignore
            - docker-compose.yml
            - README.md
  # Loki - Log aggregation system
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - monitoring

  # Promtail - Log collector
  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - monitoring

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # Disable authentication
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_DISABLE_SIGNOUT_MENU=true
      # Allow embedding
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Install JSON API plugin for API calls
      - GF_INSTALL_PLUGINS=marcusolsson-json-datasource,yesoreyeram-infinity-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    depends_on:
      - loki
      - binance-api
    networks:
      - monitoring

volumes:
  loki-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge

