apiVersion: 1

datasources:
  # Loki datasource for logs
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true

  # JSON API datasource for Binance API
  - name: Binance-API
    type: marcusolsson-json-datasource
    uid: binance-api
    access: proxy
    url: http://binance-api:8082
    isDefault: false
    editable: true
    jsonData:
      queryParams: ""

  # Infinity datasource for more flexible API queries
  - name: Infinity
    type: yesoreyeram-infinity-datasource
    uid: infinity
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      tlsSkipVerify: true

